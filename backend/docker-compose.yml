version: '3.8'

services:
  postgres-admin:
    image: postgres:15-alpine
    container_name: loyalty-postgres-admin
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: loyalty_admin
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty123
    volumes:
      - postgres-admin-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d loyalty_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-engine:
    image: postgres:15-alpine
    container_name: loyalty-postgres-engine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: loyalty_engine
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty123
    volumes:
      - postgres-engine-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d loyalty_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: loyalty-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-admin-data:
  postgres-engine-data:
  rabbitmq-data:
