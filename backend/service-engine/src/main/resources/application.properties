spring.application.name=service-engine

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/loyalty_engine
spring.datasource.username=loyalty
spring.datasource.password=loyalty123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Virtual Threads
spring.threads.virtual.enabled=true

# Server Configuration
server.port=8082
server.servlet.context-path=/

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Rule Events (SPEC-010): Unified rule sync for all types (FIDELITY, SEASONAL, PRODUCT, CLASSIFICATION)
rabbitmq.exchange.events=loyalty.events
rabbitmq.exchange.events-dlx=loyalty.events.dlx
rabbitmq.queue.rules=loyalty.rules.queue
rabbitmq.queue.rules-dlq=loyalty.dlq
rabbitmq.routing.rules=rule.*
rabbitmq.retry.max-attempts=5
rabbitmq.retry.initial-interval-ms=500
rabbitmq.retry.multiplier=2.0
rabbitmq.retry.max-interval-ms=5000
spring.rabbitmq.template.mandatory=true

# Custom RabbitMQ properties
rabbitmq.exchange.config=loyalty.config.exchange
rabbitmq.queue.api-keys=engine-api-keys-queue
rabbitmq.routing.api-keys=
rabbitmq.exchange.config-dlx=loyalty.config.dlx
rabbitmq.queue.engine-config-updated=engine.config.updated.queue
rabbitmq.queue.engine-config-updated-dlq=engine.config.updated.dlq
rabbitmq.routing.config-updated=config.updated
rabbitmq.routing.config-updated-dlq=config.updated.dlq
rabbitmq.queue.api-keys-dlq=engine-api-keys-dlq
rabbitmq.routing.api-keys-dlq=api.keys.dlq
# Seasonal Rules RabbitMQ
rabbitmq.exchange.seasonal=loyalty.seasonal.exchange
rabbitmq.exchange.seasonal-dlx=loyalty.seasonal.dlx
rabbitmq.queue.seasonal-rules=loyalty.seasonal.rules.queue
rabbitmq.queue.seasonal-rules-dlq=loyalty.seasonal.rules.dlq
rabbitmq.routing.seasonal-created=seasonal.rule.created
rabbitmq.routing.seasonal-updated=seasonal.rule.updated
rabbitmq.routing.seasonal-deleted=seasonal.rule.deleted
rabbitmq.routing.seasonal-dlq=seasonal.rule.dlq

# Classification Rules RabbitMQ
rabbitmq.exchange.classification=classification.exchange
rabbitmq.exchange.classification-dlx=classification.dlx
rabbitmq.queue.classification-rules=classification.matrix.queue
rabbitmq.queue.classification-rules-dlq=classification.dlq
rabbitmq.routing.classification-created=classification.rule.created
rabbitmq.routing.classification-updated=classification.rule.updated
rabbitmq.routing.classification-deleted=classification.rule.deleted

# Customer Tiers RabbitMQ
rabbitmq.exchange.customer-tiers=customer-tiers.exchange
rabbitmq.exchange.customer-tiers-dlx=customer-tiers.dlx
rabbitmq.queue.customer-tiers=customer-tiers.sync.queue
rabbitmq.queue.customer-tiers-dlq=customer-tiers.dlq
rabbitmq.routing.customer-tiers-created=customer-tiers.created
rabbitmq.routing.customer-tiers-updated=customer-tiers.updated

# Discount Priorities RabbitMQ
rabbitmq.exchange.discount-priority=discount.priority.exchange
rabbitmq.queue.discount-priority=discount.priority.queue
rabbitmq.queue.discount-priority-dlq=discount.priority.dlq

# Product Rules RabbitMQ
rabbitmq.exchange.product-rules=product-rules.exchange
rabbitmq.queue.product-rules=product-rules.queue

rabbitmq.retry.max-attempts=5
rabbitmq.retry.initial-interval-ms=500
rabbitmq.retry.multiplier=2.0
rabbitmq.retry.max-interval-ms=5000

# JWT Configuration (debe coincidir con service-admin)
app.jwt.secret=loyalty-secret-key-v1-please-change-in-production
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{HH:mm:ss} %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n
logging.level.com.loyalty=DEBUG
logging.level.org.springframework.web=DEBUG

logging.level.org.springframework=warn
logging.level.org.hibernate=warn
