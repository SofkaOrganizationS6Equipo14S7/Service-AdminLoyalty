spring.application.name=service-engine

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/loyalty_engine
spring.datasource.username=loyalty
spring.datasource.password=loyalty123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Virtual Threads
spring.threads.virtual.enabled=true

# Server Configuration
server.port=8082
server.servlet.context-path=/

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Custom RabbitMQ properties
rabbitmq.exchange.config=loyalty.config.exchange
rabbitmq.queue.api-keys=engine-api-keys-queue

# JWT Configuration (debe coincidir con service-admin)
app.jwt.secret=loyalty-secret-key-v1-please-change-in-production
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.loyalty=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
